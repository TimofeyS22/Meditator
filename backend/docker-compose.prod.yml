# Production stack: Postgres (pgvector), API (Gunicorn/Uvicorn), Nginx, Certbot.
# Copy .env.prod.example to .env.prod and set secrets. Obtain TLS certs before
# first HTTPS request, e.g.:
#   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#     --webroot -w /var/www/certbot -d yourdomain.com --email you@example.com --agree-tos
#
# First-time TLS (host port 80 must be free):
#   docker compose --env-file .env.prod -f docker-compose.prod.yml run --rm -p 80:80 \
#     --entrypoint certbot certbot certonly --standalone -d yourdomain.com \
#     --email you@example.com --agree-tos
# Then align nginx.conf ssl_certificate paths with /etc/letsencrypt/live/<name>/.

services:
  postgres:
    image: ankane/pgvector:latest
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - meditator
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - audio_data:/code/assets/audio
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meditator
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - audio_data:/var/www/audio:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meditator
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 43200
        done
    networks:
      - meditator

volumes:
  pgdata:
  audio_data:
  letsencrypt:
  certbot_webroot:

networks:
  meditator:
    driver: bridge
