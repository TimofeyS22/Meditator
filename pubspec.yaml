name: meditator
description: "Aura — AI-powered mental recovery system"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  dio: ^5.9.2
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/audio/
    - assets/images/
