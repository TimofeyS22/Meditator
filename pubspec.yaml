name: meditator
description: "AI-powered meditation and mental health app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.4
  go_router: ^17.1.0
  dio: ^5.9.2
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.4
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.4
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  intl: ^0.20.2
  equatable: ^2.0.8
  json_annotation: ^4.11.0
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.2
  share_plus: ^11.0.0
  permission_handler: ^12.0.1
  flutter_local_notifications: ^18.0.0
  sentry_flutter: ^9.16.0
  connectivity_plus: ^7.0.0
  record: ^6.2.0
  health: ^13.0.0
  sensors_plus: ^7.0.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: assets/images/app_icon.png

flutter_native_splash:
  color: "#020617"
  color_dark: "#020617"
  android_12:
    color: "#020617"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/audio/
    - assets/images/
  shaders:
    - shaders/aurora_flow.frag
    - shaders/cosmic_nebula.frag
    - shaders/light_atmosphere.frag